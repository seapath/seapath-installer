name: Build and publish seapath-installer deb on release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build deb package
    uses: ./.github/workflows/ci-seapath-installer.yml
    with:
      ref: ${{ github.event.release.tag_name }}
      upload_artifact: true
    secrets: inherit

  publish:
    name: Publish deb to release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download deb artifact
        uses: actions/download-artifact@v8
        with:
          name: seapath-installer-deb
          path: dist

      - name: Rename deb for release
        run: |
          release_ref='${{ github.event.release.name }}'
          deb_file=$(ls dist/seapath-installer_*_all.deb)
          release_file="dist/seapath-installer_${release_ref}_all.deb"
          mv "$deb_file" "$release_file"

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.deb
